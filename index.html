<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NOISE</title>
  <style>
    body {
      margin: 0;
      background: #fff;
      color: #111;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
    }

    main {
      max-width: 760px;
      margin: 0 auto;
      padding: 72px 24px;
    }

    header {
      margin-bottom: 96px;
    }

    h1 {
      margin: 0;
      font-size: 48px;
      font-weight: 600;
      letter-spacing: -0.04em;
    }

    nav {
      margin-top: 24px;
      display: flex;
      gap: 24px;
      font-size: 14px;
    }

    a {
      color: #111;
      text-decoration: none;
      border-bottom: 1px solid #111;
    }

    .intro {
      font-size: 20px;
      line-height: 1.7;
      letter-spacing: -0.01em;
      margin-bottom: 88px;
    }

    .section-title {
      font-size: 12px;
      font-weight: 400;
      color: #777;
      margin-bottom: 28px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    .article {
      padding: 28px 0;
      border-top: 1px solid #ddd;
    }

    .article-title {
      font-size: 24px;
      line-height: 1.4;
      margin: 0 0 8px;
      font-weight: 500;
      letter-spacing: -0.03em;
    }

    .meta {
      font-size: 13px;
      color: #777;
    }

    footer {
      margin-top: 96px;
      padding-top: 24px;
      border-top: 1px solid #ddd;
      font-size: 13px;
      color: #777;
    }
  </style>
</head>

<body>
  <main>
    <header>
      <h1>NOISE</h1>
      <nav>
        <a href="#articles">Articles</a>
        <a href="#about">About</a>
      </nav>
    </header>

    <p class="intro">
      音楽、映画、メディア、批評。<br>
      作品を、時間と関係の中で読むための場所。
    </p>

    <section id="articles">
      <div class="section-title">Latest</div>

      <article class="article">
        <h2 class="article-title">D’Angelo『Voodoo』をどう聴くか</h2>
        <div class="meta">2026.07.04 / Music</div>
      </article>

      <article class="article">
        <h2 class="article-title">Prince以後のR&Bについて</h2>
        <div class="meta">2026.07.04 / Music</div>
      </article>
    </section>

    <footer id="about">
      NOISE is an independent web magazine.
    </footer>
  </main>
</body>
</html>
