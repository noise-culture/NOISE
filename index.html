<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>NOISE — Pop Culture Web Magazine</title>
  <meta name="description" content="NOISEは、10本の記事を円弧上に配置したポップカルチャーWebマガジンです。" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;600;700&family=Inter:wght@400;500;600;700;800;900&family=Noto+Sans+JP:wght@400;500;700;900&display=swap"
    rel="stylesheet"
  />

  <style>
    :root {
      --ink: #101314;
      --ink-soft: rgba(16, 19, 20, 0.72);
      --ink-faint: rgba(16, 19, 20, 0.46);

      --paper: #fbfcf7;
      --paper-soft: rgba(255, 255, 255, 0.78);
      --glass: rgba(255, 255, 255, 0.66);

      --bg: #eef2ec;
      --mall-silver: #dfe7e4;
      --mall-green: #d8eee1;
      --mall-blue: #d9ebf8;
      --mall-pink: #f2dce8;
      --mall-yellow: #eee7bd;

      --accent-blue: #2e8cff;
      --accent-green: #7bc99e;
      --accent-pink: #ef8fc2;
      --accent-yellow: #f0dd6a;

      --line: rgba(16, 19, 20, 0.14);
      --line-strong: rgba(16, 19, 20, 0.28);

      --shadow: 0 22px 58px rgba(18, 35, 32, 0.12);
      --shadow-strong: 0 32px 86px rgba(18, 35, 32, 0.2);

      --sans: "Inter", "Noto Sans JP", -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
      --mono: "IBM Plex Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      margin: 0;
      color: var(--ink);
      font-family: var(--sans);
      background:
        radial-gradient(circle at 12% 10%, rgba(255,255,255,0.9), transparent 18%),
        radial-gradient(circle at 88% 18%, rgba(217,235,248,0.82), transparent 28%),
        radial-gradient(circle at 14% 90%, rgba(216,238,225,0.78), transparent 28%),
        linear-gradient(180deg, #f8faf7 0%, #edf3ef 48%, #e3ece8 100%);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      touch-action: none;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -2;
      pointer-events: none;
      background:
        linear-gradient(90deg, rgba(16,19,20,0.035) 1px, transparent 1px),
        linear-gradient(0deg, rgba(16,19,20,0.03) 1px, transparent 1px);
      background-size: 28px 28px;
      opacity: 0.8;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      background:
        repeating-linear-gradient(
          0deg,
          rgba(255,255,255,0.12) 0 2px,
          rgba(16,19,20,0.015) 2px 4px
        );
      opacity: 0.32;
      mix-blend-mode: multiply;
    }

    button,
    a {
      font: inherit;
      color: inherit;
    }

    button {
      border: 0;
    }

    a {
      text-decoration: none;
    }

    .app {
      position: relative;
      width: 100vw;
      height: 100svh;
      overflow: hidden;
    }

    .top-nav {
      position: fixed;
      top: 12px;
      left: 50%;
      z-index: 50;
      width: min(1080px, calc(100vw - 18px));
      transform: translateX(-50%);
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 10px 12px;
      border-radius: 999px;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.88), rgba(237,244,241,0.76));
      border: 1px solid rgba(255,255,255,0.68);
      box-shadow: var(--shadow);
      backdrop-filter: blur(20px) saturate(1.1);
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand img {
      display: block;
      width: 112px;
      height: auto;
      filter: drop-shadow(0 8px 18px rgba(0,0,0,0.08));
    }

    .brand-copy {
      display: grid;
      gap: 2px;
      min-width: 0;
    }

    .brand-copy strong {
      font-size: 11px;
      line-height: 1;
      font-weight: 900;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .brand-copy span {
      font-family: var(--mono);
      font-size: 8px;
      line-height: 1;
      font-weight: 700;
      letter-spacing: 0.11em;
      text-transform: uppercase;
      color: var(--ink-faint);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .nav-line {
      min-width: 0;
      display: flex;
      justify-content: center;
    }

    .nav-line p {
      max-width: 100%;
      margin: 0;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.62);
      border: 1px solid rgba(16,19,20,0.08);
      font-family: var(--mono);
      font-size: 9px;
      line-height: 1;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink-faint);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .nav-status {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 74px;
      height: 38px;
      padding: 0 13px;
      border-radius: 999px;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.94), rgba(220,232,228,0.82));
      border: 1px solid rgba(16,19,20,0.08);
      box-shadow: 0 10px 22px rgba(18,35,32,0.08);
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.11em;
      text-transform: uppercase;
      color: var(--ink);
    }

    .stage {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      padding: 96px 18px 28px;
    }

    .intro {
      position: absolute;
      z-index: 12;
      left: clamp(18px, 5vw, 64px);
      top: clamp(106px, 16vh, 150px);
      width: min(480px, calc(100vw - 36px));
      display: grid;
      gap: 16px;
      pointer-events: none;
    }

    .intro-label {
      width: fit-content;
      padding: 8px 12px;
      border-radius: 999px;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.92), rgba(216,238,225,0.8));
      border: 1px solid rgba(16,19,20,0.08);
      box-shadow: 0 10px 22px rgba(18,35,32,0.08);
      font-family: var(--mono);
      font-size: 10px;
      line-height: 1;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink);
    }

    .intro h1 {
      margin: 0;
      font-size: clamp(32px, 8vw, 78px);
      line-height: 0.96;
      letter-spacing: -0.085em;
      font-weight: 900;
      color: var(--ink);
    }

    .intro p {
      width: min(440px, 100%);
      margin: 0;
      padding: 16px 17px;
      border-radius: 24px;
      background: rgba(255,255,255,0.72);
      border: 1px solid rgba(255,255,255,0.62);
      box-shadow: var(--shadow);
      font-size: 13px;
      line-height: 1.82;
      font-weight: 600;
      color: var(--ink-soft);
    }

    .system-label {
      position: absolute;
      z-index: 10;
      right: clamp(18px, 5vw, 64px);
      bottom: clamp(22px, 5vh, 54px);
      width: min(300px, calc(100vw - 36px));
      padding: 15px;
      border-radius: 24px;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.78), rgba(235,243,240,0.68));
      border: 1px solid rgba(255,255,255,0.62);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
      pointer-events: none;
    }

    .system-label strong {
      display: block;
      margin-bottom: 8px;
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .system-label p {
      margin: 0;
      font-size: 12px;
      line-height: 1.7;
      font-weight: 600;
      color: var(--ink-soft);
    }

    .arc-svg {
      position: absolute;
      inset: 0;
      z-index: 2;
      width: 100%;
      height: 100%;
      overflow: visible;
      pointer-events: none;
    }

    .arc-shadow {
      fill: none;
      stroke: rgba(255,255,255,0.62);
      stroke-width: 56;
      stroke-linecap: round;
      filter: drop-shadow(0 28px 40px rgba(18,35,32,0.12));
    }

    .arc-rail {
      fill: none;
      stroke: rgba(16,19,20,0.11);
      stroke-width: 2;
      stroke-linecap: round;
      stroke-dasharray: 4 12;
    }

    .arc-track {
      fill: none;
      stroke: rgba(46,140,255,0.28);
      stroke-width: 14;
      stroke-linecap: round;
      stroke-dasharray: 1 18;
    }

    .arc-layer {
      position: absolute;
      inset: 0;
      z-index: 8;
      pointer-events: none;
    }

    .arc-card {
      position: absolute;
      width: clamp(168px, 46vw, 272px);
      min-height: 120px;
      padding: 12px;
      border-radius: 26px;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.9), rgba(237,244,241,0.78));
      border: 1px solid rgba(255,255,255,0.68);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
      text-align: left;
      cursor: pointer;
      pointer-events: auto;
      transform-origin: center;
      transition:
        box-shadow 0.18s ease,
        background 0.18s ease,
        opacity 0.18s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .arc-card:focus-visible {
      outline: 4px solid rgba(46,140,255,0.28);
      outline-offset: 5px;
    }

    .arc-card:active {
      box-shadow: 0 14px 32px rgba(18,35,32,0.16);
    }

    .card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 9px;
    }

    .card-number {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 34px;
      height: 34px;
      border-radius: 999px;
      background:
        linear-gradient(135deg, rgba(182,216,255,0.92), rgba(255,255,255,0.96));
      box-shadow: inset 0 0 0 1px rgba(16,19,20,0.05);
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
    }

    .card-category {
      min-width: 0;
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.7);
      border: 1px solid rgba(16,19,20,0.06);
      font-family: var(--mono);
      font-size: 8px;
      line-height: 1;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-faint);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .arc-card h2 {
      margin: 0;
      font-size: clamp(18px, 4.5vw, 25px);
      line-height: 1.06;
      letter-spacing: -0.075em;
      font-weight: 900;
      color: var(--ink);
    }

    .arc-card p {
      margin: 9px 0 0;
      font-size: 11px;
      line-height: 1.56;
      font-weight: 600;
      color: var(--ink-soft);
    }

    .tap-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-top: 10px;
      padding: 7px 9px;
      border-radius: 999px;
      background: rgba(255,255,255,0.7);
      border: 1px solid rgba(16,19,20,0.06);
      font-family: var(--mono);
      font-size: 8px;
      line-height: 1;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink);
    }

    .arc-card.is-near {
      background:
        linear-gradient(135deg, rgba(255,255,255,0.96), rgba(217,235,248,0.8));
    }

    .drag-plane {
      position: absolute;
      inset: 0;
      z-index: 6;
      cursor: grab;
    }

    .drag-plane:active {
      cursor: grabbing;
    }

    .mini-map {
      position: absolute;
      z-index: 11;
      right: clamp(18px, 5vw, 64px);
      top: clamp(106px, 16vh, 150px);
      display: grid;
      gap: 8px;
      pointer-events: none;
    }

    .mini-map span {
      display: block;
      width: 46px;
      height: 8px;
      border-radius: 999px;
      background: rgba(16,19,20,0.12);
    }

    .mini-map span.is-active {
      background: var(--accent-blue);
      box-shadow: 0 8px 18px rgba(46,140,255,0.24);
    }

    .reader {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: grid;
      place-items: center;
      padding: 18px;
      background:
        radial-gradient(circle at 14% 16%, rgba(255,255,255,0.5), transparent 20%),
        rgba(16, 19, 20, 0.38);
      backdrop-filter: blur(16px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.22s ease;
    }

    .reader.is-open {
      opacity: 1;
      pointer-events: auto;
    }

    .reader-card {
      width: min(920px, 94vw);
      max-height: min(760px, 92svh);
      overflow: hidden;
      border-radius: 34px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.96), rgba(239,245,243,0.94));
      border: 1px solid rgba(255,255,255,0.72);
      box-shadow: var(--shadow-strong);
      transform: scale(0.92) translateY(18px);
      transition: transform 0.26s cubic-bezier(.18,.82,.2,1);
    }

    .reader.is-open .reader-card {
      transform: scale(1) translateY(0);
    }

    .reader-head {
      position: relative;
      padding: 22px 22px 20px;
      background:
        radial-gradient(circle at 18% 20%, rgba(255,255,255,0.9), transparent 18%),
        linear-gradient(135deg, rgba(217,235,248,0.84), rgba(216,238,225,0.74));
      border-bottom: 1px solid rgba(16,19,20,0.08);
    }

    .reader-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
    }

    .reader-meta span {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 8px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.74);
      border: 1px solid rgba(16,19,20,0.06);
      font-family: var(--mono);
      font-size: 10px;
      line-height: 1;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink);
    }

    .reader-head h2 {
      max-width: 760px;
      margin: 0;
      font-size: clamp(34px, 7vw, 70px);
      line-height: 1.01;
      letter-spacing: -0.085em;
      font-weight: 900;
      color: var(--ink);
    }

    .reader-lead {
      max-width: 680px;
      margin: 14px 0 0;
      font-size: 15px;
      line-height: 1.76;
      font-weight: 600;
      color: var(--ink-soft);
    }

    .reader-body {
      max-height: calc(min(760px, 92svh) - 260px);
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 22px;
      background:
        linear-gradient(90deg, rgba(16,19,20,0.028) 1px, transparent 1px),
        linear-gradient(0deg, rgba(16,19,20,0.024) 1px, transparent 1px),
        rgba(251,252,247,0.94);
      background-size: 28px 28px;
    }

    .reader-body p {
      max-width: 720px;
      margin: 0 0 18px;
      font-size: 15.5px;
      line-height: 2;
      font-weight: 500;
      color: rgba(16,19,20,0.84);
    }

    .reader-actions {
      display: flex;
      justify-content: center;
      padding: 14px;
      background: rgba(255,255,255,0.72);
      border-top: 1px solid rgba(16,19,20,0.08);
    }

    .reader-close {
      min-width: 240px;
      min-height: 54px;
      padding: 15px 20px;
      border-radius: 999px;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.96), rgba(223,232,230,0.9));
      border: 1px solid rgba(255,255,255,0.72);
      box-shadow: 0 14px 28px rgba(18,35,32,0.12);
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink);
      cursor: pointer;
    }

    @media (max-width: 760px) {
      .top-nav {
        grid-template-columns: 1fr auto;
        border-radius: 28px;
      }

      .brand-copy,
      .nav-line {
        display: none;
      }

      .brand {
        justify-content: start;
      }

      .brand img {
        width: 108px;
      }

      .nav-status {
        min-width: 62px;
        height: 36px;
        font-size: 9px;
      }

      .stage {
        padding: 82px 12px 18px;
      }

      .intro {
        top: 92px;
        left: 14px;
        width: calc(100vw - 28px);
        gap: 12px;
      }

      .intro-label {
        font-size: 9px;
      }

      .intro h1 {
        max-width: 290px;
        font-size: clamp(34px, 11vw, 56px);
      }

      .intro p {
        width: min(300px, 78vw);
        padding: 13px 14px;
        font-size: 12px;
        line-height: 1.72;
      }

      .system-label {
        display: none;
      }

      .mini-map {
        right: 14px;
        top: 92px;
        gap: 6px;
      }

      .mini-map span {
        width: 34px;
        height: 6px;
      }

      .arc-card {
        width: clamp(164px, 54vw, 228px);
        min-height: 112px;
        padding: 11px;
        border-radius: 22px;
      }

      .arc-card p {
        display: none;
      }

      .tap-chip {
        margin-top: 9px;
      }

      .reader {
        padding: 8px;
      }

      .reader-card {
        width: 96vw;
        max-height: 94svh;
        border-radius: 28px;
      }

      .reader-head {
        padding: 18px 16px 16px;
      }

      .reader-head h2 {
        font-size: clamp(30px, 9vw, 44px);
        line-height: 1.06;
      }

      .reader-lead {
        font-size: 14px;
        line-height: 1.74;
      }

      .reader-body {
        max-height: calc(94svh - 250px);
        padding: 18px 15px;
      }

      .reader-body p {
        font-size: 14px;
        line-height: 1.9;
      }

      .reader-close {
        width: min(340px, calc(100vw - 34px));
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .arc-card,
      .reader,
      .reader-card {
        transition: none;
      }
    }
  </style>
</head>

<body>
  <div class="app" id="app">
    <header class="top-nav">
      <a class="brand" href="#" aria-label="NOISE">
        <img src="assets/logo.png" alt="NOISE" />
        <span class="brand-copy">
          <strong>NOISE</strong>
          <span>radial pop culture magazine</span>
        </span>
      </a>

      <div class="nav-line">
        <p>infinite arc / 6 o'clock to 10 o'clock / tap to expand</p>
      </div>

      <div class="nav-status" id="navStatus">01 / 10</div>
    </header>

    <main class="stage" id="stage">
      <div class="drag-plane" id="dragPlane" aria-hidden="true"></div>

      <section class="intro" aria-label="NOISE 概要">
        <div class="intro-label">Issue 001 / Infinite Arc</div>
        <h1>終わらない記事の弧。</h1>
        <p>
          6時から10時へ伸びる円弧の上に、10本の記事を配置しました。縦にスクロール、またはスワイプすると記事コマが循環します。読みたいコマはタップしてください。
        </p>
      </section>

      <svg class="arc-svg" id="arcSvg" aria-hidden="true">
        <path class="arc-shadow" id="arcShadow" />
        <path class="arc-track" id="arcTrack" />
        <path class="arc-rail" id="arcRail" />
      </svg>

      <div class="arc-layer" id="arcLayer" aria-label="記事一覧"></div>

      <div class="mini-map" id="miniMap" aria-hidden="true"></div>

      <aside class="system-label">
        <strong>How it works</strong>
        <p>
          通常の縦長ページではなく、弧の上を記事が回る構造です。最後の記事の次は、最初の記事に戻ります。
        </p>
      </aside>
    </main>

    <section class="reader" id="reader" aria-hidden="true">
      <article class="reader-card" role="dialog" aria-modal="true" aria-labelledby="readerTitle">
        <header class="reader-head">
          <div class="reader-meta" id="readerMeta"></div>
          <h2 id="readerTitle"></h2>
          <p class="reader-lead" id="readerLead"></p>
        </header>

        <div class="reader-body" id="readerBody"></div>

        <div class="reader-actions">
          <button class="reader-close" id="readerClose" type="button">Tap here to return</button>
        </div>
      </article>
    </section>
  </div>

  <script>
    const articles = [
      {
        number: "01",
        category: "Film",
        title: "映画『マイケル』レビュー",
        teaser: "スターは誰の視線によって作られるのか。伝記映画を、視線と編集の映画として読む。",

    const stage = document.getElementById("stage");
    const dragPlane = document.getElementById("dragPlane");
    const arcLayer = document.getElementById("arcLayer");
    const arcSvg = document.getElementById("arcSvg");
    const arcShadow = document.getElementById("arcShadow");
    const arcTrack = document.getElementById("arcTrack");
    const arcRail = document.getElementById("arcRail");
    const miniMap = document.getElementById("miniMap");
    const navStatus = document.getElementById("navStatus");

    const reader = document.getElementById("reader");
    const readerTitle = document.getElementById("readerTitle");
    const readerLead = document.getElementById("readerLead");
    const readerMeta = document.getElementById("readerMeta");
    const readerBody = document.getElementById("readerBody");
    const readerClose = document.getElementById("readerClose");

    let offset = 0;
    let targetOffset = 0;
    let isDragging = false;
    let lastY = 0;
    let animationFrame = null;

    const total = articles.length;

    function escapeHTML(value) {
      return String(value).replace(/[&<>"']/g, character => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      }[character]));
    }

    function mod(value, length) {
      return ((value % length) + length) % length;
    }

    function angleToPoint(cx, cy, radius, degrees) {
      const radians = degrees * Math.PI / 180;
      return {
        x: cx + radius * Math.cos(radians),
        y: cy + radius * Math.sin(radians)
      };
    }

    function createArcPath(cx, cy, radius, startDeg, endDeg) {
      const start = angleToPoint(cx, cy, radius, startDeg);
      const end = angleToPoint(cx, cy, radius, endDeg);
      const largeArcFlag = Math.abs(endDeg - startDeg) > 180 ? 1 : 0;
      const sweepFlag = 1;
      return `M ${start.x} ${start.y} A ${radius} ${radius} 0 ${largeArcFlag} ${sweepFlag} ${end.x} ${end.y}`;
    }

    function renderCards() {
      arcLayer.innerHTML = articles.map((article, index) => `
        <button class="arc-card" type="button" data-index="${index}" aria-label="${escapeHTML(article.title)}を読む">
          <div class="card-top">
            <span class="card-number">${escapeHTML(article.number)}</span>
            <span class="card-category">${escapeHTML(article.category)}</span>
          </div>
          <h2>${escapeHTML(article.title)}</h2>
          <p>${escapeHTML(article.teaser)}</p>
          <span class="tap-chip">Tap to read</span>
        </button>
      `).join("");

      miniMap.innerHTML = articles.map((_, index) => `<span data-map-index="${index}"></span>`).join("");

      document.querySelectorAll(".arc-card").forEach(card => {
        card.addEventListener("click", event => {
          event.stopPropagation();
          openReader(Number(card.dataset.index));
        });
      });
    }

    function layoutArc() {
      const rect = stage.getBoundingClientRect();
      const width = rect.width;
      const height = rect.height;
      const isMobile = width < 760;

      const cx = isMobile ? width * 0.9 : width * 0.62;
      const cy = isMobile ? height * 0.45 : height * 0.5;
      const radius = isMobile
        ? Math.min(width * 1.08, height * 0.56)
        : Math.min(width * 0.48, height * 0.58);

      const startDeg = 90;
      const endDeg = 210;
      const span = endDeg - startDeg;

      const arcPath = createArcPath(cx, cy, radius, startDeg, endDeg);
      arcShadow.setAttribute("d", arcPath);
      arcTrack.setAttribute("d", arcPath);
      arcRail.setAttribute("d", arcPath);

      const cards = document.querySelectorAll(".arc-card");
      let activeIndex = 0;
      let activeDistance = Infinity;

      cards.forEach((card, index) => {
        const raw = mod(index - offset, total);
        const t = raw / (total - 1);
        const angle = startDeg + t * span;
        const point = angleToPoint(cx, cy, radius, angle);

        const centerPreference = Math.abs(t - 0.5);
        if (centerPreference < activeDistance) {
          activeDistance = centerPreference;
          activeIndex = index;
        }

        const prominence = 1 - Math.min(1, Math.abs(t - 0.5) * 1.8);
        const scale = 0.76 + prominence * 0.22;
        const rotate = -12 + t * 24;
        const opacity = 0.46 + prominence * 0.54;
        const blur = Math.max(0, 1.6 - prominence * 2.2);

        card.style.left = `${point.x}px`;
        card.style.top = `${point.y}px`;
        card.style.zIndex = String(100 + Math.round(prominence * 100));
        card.style.opacity = String(opacity);
        card.style.filter = `blur(${blur}px)`;
        card.style.transform = `translate(-50%, -50%) rotate(${rotate}deg) scale(${scale})`;

        if (prominence > 0.82) {
          card.classList.add("is-near");
        } else {
          card.classList.remove("is-near");
        }
      });

      navStatus.textContent = `${String(activeIndex + 1).padStart(2, "0")} / 10`;

      document.querySelectorAll(".mini-map span").forEach((dot, index) => {
        dot.classList.toggle("is-active", index === activeIndex);
      });
    }

    function animate() {
      offset += (targetOffset - offset) * 0.14;
      layoutArc();
      animationFrame = requestAnimationFrame(animate);
    }

    function moveArc(delta) {
      targetOffset += delta;
    }

    function openReader(index) {
      const article = articles[index];

      readerMeta.innerHTML = `
        <span>${escapeHTML(article.number)} / 10</span>
        <span>${escapeHTML(article.category)}</span>
        <span>${escapeHTML(article.meta)}</span>
      `;

      readerTitle.textContent = article.title;
      readerLead.textContent = article.lead;
      readerBody.innerHTML = article.body.map(paragraph => `<p>${escapeHTML(paragraph)}</p>`).join("");

      reader.classList.add("is-open");
      reader.setAttribute("aria-hidden", "false");
      document.body.classList.add("panel-open");

      setTimeout(() => readerClose.focus(), 80);
    }

    function closeReader() {
      reader.classList.remove("is-open");
      reader.setAttribute("aria-hidden", "true");
      document.body.classList.remove("panel-open");
    }

    window.addEventListener("wheel", event => {
      if (reader.classList.contains("is-open")) return;
      event.preventDefault();
      moveArc(event.deltaY * 0.0045);
    }, { passive: false });

    dragPlane.addEventListener("pointerdown", event => {
      if (reader.classList.contains("is-open")) return;
      isDragging = true;
      lastY = event.clientY;
      dragPlane.setPointerCapture(event.pointerId);
    });

    dragPlane.addEventListener("pointermove", event => {
      if (!isDragging || reader.classList.contains("is-open")) return;
      const deltaY = lastY - event.clientY;
      lastY = event.clientY;
      moveArc(deltaY * 0.018);
    });

    dragPlane.addEventListener("pointerup", event => {
      isDragging = false;
      if (dragPlane.hasPointerCapture(event.pointerId)) {
        dragPlane.releasePointerCapture(event.pointerId);
      }
    });

    dragPlane.addEventListener("pointercancel", () => {
      isDragging = false;
    });

    document.addEventListener("keydown", event => {
      if (event.key === "Escape" && reader.classList.contains("is-open")) {
        closeReader();
        return;
      }

      if (reader.classList.contains("is-open")) return;

      if (event.key === "ArrowDown" || event.key === "PageDown") {
        moveArc(0.7);
      }

      if (event.key === "ArrowUp" || event.key === "PageUp") {
        moveArc(-0.7);
      }
    });

    readerClose.addEventListener("click", closeReader);

    reader.addEventListener("click", event => {
      if (event.target === reader) {
        closeReader();
      }
    });

    window.addEventListener("resize", layoutArc);

    renderCards();
    layoutArc();
    animate();
  </script>
